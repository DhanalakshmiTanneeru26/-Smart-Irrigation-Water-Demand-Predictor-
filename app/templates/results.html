{% extends 'base.html' %}

{% block title %}Prediction Results{% endblock %}

{% block content %}
  <section class="card">
    <h1 class="card-title">Prediction Results</h1>
    <div class="result">
      <div class="result-row">
        <span class="result-label">Water Requirement</span>
        <span class="result-value">{{ prediction }} units</span>
      </div>
      <div class="result-row">
        <span class="result-label">Recommended Crop</span>
        <span class="result-value">{{ recommended_crop }}</span>
      </div>
    </div>
    <a class="btn btn-secondary" href="{{ url_for('home') }}">New Prediction</a>
  </section>
{% endblock %}
